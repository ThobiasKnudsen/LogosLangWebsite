name: docs-ci

# Two entry points:
#   - pull_request: enforce the docs versioning model (valid prefixes, freeze of
#     released snapshots, forward-only edits). Make this a REQUIRED status check.
#   - repository_dispatch (logoslang-release): triggered by the LogosLang repo when
#     it pushes a tag. Verifies the in-progress docs match the released version,
#     then tags this repo vX.Y.Z, which freezes those docs.

on:
  pull_request:
    paths:
      - 'content/docs/**'
      - 'build/version.ts'
      - 'build/ci-check.ts'
  repository_dispatch:
    types: [logoslang-release]

permissions:
  contents: write # needed to push the release tag

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the freeze guard can diff against R
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm ci
      - run: npx tsx build/ci-check.ts validate

  release:
    if: github.event_name == 'repository_dispatch'
    # Serialize releases so two version dispatches can't race on the tag push and
    # deploy hook; queue them rather than dropping any.
    concurrency:
      group: website-release
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm ci
      - name: Verify in-progress docs match the released version
        run: npx tsx build/ci-check.ts release "${{ github.event.client_payload.version }}"
      - name: Tag the website at this release
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          TAG="v${VERSION#v}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Froze docs at $TAG."
      - name: Rebuild the site so the new build + docs go live (Cloudflare deploy hook)
        env:
          HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -sf -X POST "$HOOK" && echo "Triggered Cloudflare rebuild."
          else
            echo "CLOUDFLARE_DEPLOY_HOOK_URL not set; skipping rebuild trigger."
          fi
