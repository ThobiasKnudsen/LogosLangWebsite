name: roadmap-rebuild

# The roadmap page (logoslang.dev/roadmap) is generated at build time from
# LogosLang's `roadmap`-labelled GitHub issues (build/fetch-roadmap.ts). So when
# that source data changes, the site must rebuild to pick it up. Two triggers:
#
#   - repository_dispatch (roadmap-sync): sent by LogosLang's roadmap-sync workflow
#     whenever a roadmap issue or milestone changes — near-instant updates.
#   - schedule: a daily safety net so milestone due-date changes (which fire no
#     webhook) and any missed events still reach the site within a day.
#
# Both just POST the Cloudflare deploy hook; the rebuild re-fetches the issues.
# (The release pipeline already fires the same hook via docs-ci.yml on a release.)

on:
  repository_dispatch:
    types: [roadmap-sync]
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {} # allow a manual rebuild from the Actions tab

permissions:
  contents: read

# Coalesce bursts of issue edits into a single rebuild.
concurrency:
  group: roadmap-rebuild
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        env:
          HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -sf -X POST "$HOOK" && echo "Triggered Cloudflare rebuild."
          else
            echo "CLOUDFLARE_DEPLOY_HOOK_URL not set; skipping rebuild trigger." >&2
          fi
